<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>lethargia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    @keyframes bgShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes titleBounce {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-8px) rotate(1deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px #ff79c6; }
      50%       { box-shadow: 0 0 20px #ff79c6, 0 0 40px #bd93f9; }
    }
    @keyframes msgPop {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes cooldownShrink {
      from { width: 100%; }
      to   { width: 0%; }
    }
    * { box-sizing: border-box; font-family: 'Comic Sans MS', 'Comic Sans', cursive; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #533483);
      background-size: 400% 400%;
      animation: bgShift 10s ease infinite;
      color: #eee;
    }
    /* AUTH */
    #authScreen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 20px;
      animation: fadeIn 0.5s ease both;
    }
    #authScreen h1 {
      font-size: 3rem; color: #ff79c6;
      text-shadow: 0 0 10px #ff79c6, 0 0 30px #bd93f9;
      animation: titleBounce 2.5s ease-in-out infinite; margin-bottom: 8px;
    }
    #authScreen p { color: #6272a4; margin-bottom: 28px; font-size: 14px; }
    .auth-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px; padding: 28px 32px; width: 100%; max-width: 360px;
      backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 12px;
    }
    .auth-card label { font-size: 12px; color: #bd93f9; margin-bottom: 2px; display: block; }
    .auth-card input {
      width: 100%; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
      color: #eee; padding: 10px 14px; font-size: 14px;
      font-family: 'Comic Sans MS', cursive; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-card input:focus { border-color: #bd93f9; box-shadow: 0 0 8px #bd93f9; }
    .auth-card button {
      margin-top: 6px; width: 100%; font-family: 'Comic Sans MS', cursive;
      font-size: 15px; font-weight: bold; padding: 11px; border: none;
      border-radius: 10px; cursor: pointer;
      background: linear-gradient(135deg, #bd93f9, #ff79c6); color: #1a1a2e;
      animation: pulse 2.5s ease-in-out infinite; transition: transform 0.1s;
    }
    .auth-card button:hover { transform: translateY(-2px) scale(1.03); }
    #authError { color: #ff5555; font-size: 13px; min-height: 18px; text-align: center; }
    /* GAME */
    #gameScreen { display: none; flex-direction: column; height: 100vh; padding: 10px; gap: 8px; }
    #gameScreen.visible { display: flex; }
    .top-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
    .top-bar h2 {
      font-size: 1.3rem; color: #ff79c6;
      text-shadow: 0 0 8px #ff79c6; margin: 0;
      animation: titleBounce 2.5s ease-in-out infinite;
    }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ff5555; flex-shrink: 0; }
    .dot.connected { background: #50fa7b; box-shadow: 0 0 6px #50fa7b; }
    #statusText { font-size: 12px; color: #6272a4; }
    .main-area { display: flex; gap: 8px; flex: 1; min-height: 0; }

    /* Canvas wrapper */
    .canvas-wrap {
      flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0;
    }

    /* The pixel canvas + player overlay share the same space */
    .canvas-container {
      flex: 1; position: relative; border-radius: 12px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: #1a1a2e; cursor: crosshair;
    }
    #pixelCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; image-rendering: pixelated; }
    #playerCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    /* Palette + controls bar */
    .palette-bar {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      background: rgba(255,255,255,0.05); border-radius: 10px; padding: 8px 10px;
      flex-shrink: 0;
    }
    .palette-bar span { font-size: 11px; color: #6272a4; }
    .swatch {
      width: 22px; height: 22px; border-radius: 5px; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.selected { border-color: #fff; transform: scale(1.25); }
    #customColor { width: 28px; height: 28px; border: none; border-radius: 5px; cursor: pointer; padding: 0; background: none; }

    /* Cooldown bar */
    .cooldown-wrap {
      height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; flex: 1;
    }
    #cooldownBar {
      height: 100%; background: linear-gradient(90deg, #50fa7b, #bd93f9);
      border-radius: 3px; width: 100%; transition: none;
    }
    #cooldownLabel { font-size: 11px; color: #6272a4; white-space: nowrap; }

    /* Zoom controls */
    .zoom-btns { display: flex; gap: 4px; margin-left: auto; }
    .zoom-btns button {
      font-family: 'Comic Sans MS', cursive; font-size: 13px; font-weight: bold;
      padding: 4px 10px; border: none; border-radius: 7px; cursor: pointer;
      background: rgba(189,147,249,0.3); color: #eee; transition: background 0.1s;
    }
    .zoom-btns button:hover { background: rgba(189,147,249,0.6); }

    /* Side panel */
    .side-panel { width: 230px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
    .card {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 10px; backdrop-filter: blur(8px);
    }
    .card-title { font-size: 10px; color: #bd93f9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

    /* Chat */
    #log { flex: 1; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 2px; min-height: 0; }
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-thumb { background: #bd93f9; border-radius: 2px; }
    #log div { animation: msgPop 0.2s ease both; padding: 2px 4px; border-radius: 4px; word-break: break-word; }
    .msg-in  { color: #8be9fd; }
    .msg-out { color: #50fa7b; }
    .msg-err { color: #ff5555; background: rgba(255,85,85,0.08); }
    .msg-sys { color: #6272a4; }
    .msg-pixel { color: #ffb86c; }
    .chat-row { display: flex; gap: 5px; margin-top: 6px; }
    .chat-row input {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px; color: #eee; padding: 6px 8px; font-size: 12px;
      font-family: 'Comic Sans MS', cursive; outline: none;
    }
    .chat-row input:focus { border-color: #bd93f9; }
    .chat-row button {
      font-family: 'Comic Sans MS', cursive; font-size: 12px; font-weight: bold;
      padding: 6px 10px; border: none; border-radius: 7px; cursor: pointer;
      background: linear-gradient(135deg, #bd93f9, #ff79c6); color: #1a1a2e;
    }

    /* Players list */
    #playerList { font-size: 11px; display: flex; flex-direction: column; gap: 3px; max-height: 100px; overflow-y: auto; }
    #playerList::-webkit-scrollbar { width: 3px; }
    #playerList::-webkit-scrollbar-thumb { background: #bd93f9; border-radius: 2px; }
    .player-entry { display: flex; align-items: center; gap: 5px; padding: 2px 5px; border-radius: 5px; background: rgba(255,255,255,0.03); }
    .player-color { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .hint { font-size: 10px; color: #6272a4; line-height: 1.8; }
    .ban-row { display: flex; gap: 5px; margin-top: 5px; }
    .ban-row input {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 7px; color: #eee; padding: 5px 8px; font-size: 11px;
      font-family: 'Comic Sans MS', cursive; outline: none;
    }
    .ban-row button {
      font-size: 11px; font-weight: bold; padding: 5px 9px; border: none; border-radius: 7px;
      cursor: pointer; font-family: 'Comic Sans MS', cursive;
      background: linear-gradient(135deg, #ff5555, #ff79c6); color: #1a1a2e;
    }
    #adminPanel { display: none; }
    #adminPanel.visible { display: block; }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <h1>lethargia</h1>
  <p>a collaborative pixel canvas</p>
  <div class="auth-card">
    <div>
      <label>Username</label>
      <input id="authUsername" placeholder="your name..." maxlength="32" autocomplete="off" />
    </div>
    <div id="authPasswordWrap" style="display:none">
      <label>Password <span style="color:#6272a4">(Aika only)</span></label>
      <input id="authPassword" type="password" placeholder="••••••••" />
    </div>
    <div id="authError"></div>
    <button onclick="joinGame()">🎨 Join</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen">
  <div class="top-bar">
    <h2>lethargia</h2>
    <span class="dot" id="dot"></span>
    <span id="statusText">Connecting...</span>
    <span style="font-size:11px;color:#6272a4;margin-left:4px">
      as <span id="myNameDisplay" style="color:#ff79c6"></span>
    </span>
    <span id="coordDisplay" style="font-size:11px;color:#6272a4;margin-left:auto"></span>
  </div>

  <div class="main-area">
    <div class="canvas-wrap">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="pixelCanvas"></canvas>
        <canvas id="playerCanvas"></canvas>
      </div>
      <div class="palette-bar">
        <span>color:</span>
        <div id="swatches"></div>
        <input type="color" id="customColor" value="#ff79c6" title="Custom color" />
        <div class="cooldown-wrap"><div id="cooldownBar"></div></div>
        <span id="cooldownLabel">ready</span>
        <div class="zoom-btns">
          <button onclick="zoom(-1)">−</button>
          <button onclick="zoom(1)">+</button>
          <button onclick="resetView()">⌂</button>
        </div>
      </div>
    </div>

    <div class="side-panel">
      <div class="card" style="flex:1;display:flex;flex-direction:column;min-height:0;">
        <div class="card-title">💬 chat</div>
        <div id="log"></div>
        <div class="chat-row">
          <input id="chatInput" placeholder="say something..." />
          <button onclick="sendChat()">→</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">👥 online</div>
        <div id="playerList"></div>
      </div>
      <div class="card">
        <div class="card-title">🕹️ controls</div>
        <div class="hint">
          Click / drag — place pixels<br>
          Arrow keys / WASD — move<br>
          Scroll — zoom<br>
          Middle drag — pan
        </div>
      </div>
      <div class="card" id="adminPanel">
        <div class="card-title">🔨 admin</div>
        <div style="font-size:10px;color:#6272a4;margin-bottom:4px;">ban by player ID</div>
        <div class="ban-row">
          <input id="banInput" type="number" placeholder="id..." />
          <button onclick="doBan()">ban</button>
        </div>
        <button onclick="clearCanvas()" style="margin-top:6px;width:100%;font-size:11px;padding:5px;border:none;border-radius:7px;cursor:pointer;background:linear-gradient(135deg,#ff5555,#ffb86c);color:#1a1a2e;font-family:'Comic Sans MS',cursive;font-weight:bold;">
          🗑️ clear canvas
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ── Config ──
const WS_URL = (location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host;
const PLAYER_RADIUS = 10;
const SPEED = 3;
const COLORS = ['#ff79c6','#8be9fd','#50fa7b','#ffb86c','#bd93f9','#f1fa8c',
                '#ff5555','#ffffff','#1a1a2e','#0f3460','#533483','#ff9580',
                '#80ffea','#8aff80','#ffff80','#9580ff','#ff80bf','#000000'];

// ── State ──
let ws = null, myId = null, myUsername = '', pendingPassword = '';
let players = {};
let keys = {};
let animFrame = null, lastMoveSent = 0;
let CANVAS_W = 200, CANVAS_H = 150, PIXEL_COOLDOWN = 5000;
let canvasData = null;
let selectedColor = '#ff79c6';
let cooldownEnd = 0;
let cooldownAnim = null;

// View transform (pan + zoom)
let viewX = 0, viewY = 0, viewScale = 3;
let isDragging = false, dragButton = -1;
let dragStartX = 0, dragStartY = 0, dragViewX = 0, dragViewY = 0;
let isPlacing = false;

// ── Canvas elements ──
const pixelCanvas  = document.getElementById('pixelCanvas');
const playerCanvas = document.getElementById('playerCanvas');
const pCtx = pixelCanvas.getContext('2d');
const aCtx = playerCanvas.getContext('2d');
const container = document.getElementById('canvasContainer');

// ── Build palette ──
const swatchContainer = document.getElementById('swatches');
COLORS.forEach(c => {
  const s = document.createElement('div');
  s.className = 'swatch' + (c === selectedColor ? ' selected' : '');
  s.style.background = c;
  s.title = c;
  s.onclick = () => { selectedColor = c; refreshSwatches(); };
  swatchContainer.appendChild(s);
});
document.getElementById('customColor').addEventListener('input', e => {
  selectedColor = e.target.value;
  refreshSwatches();
});
function refreshSwatches() {
  document.querySelectorAll('.swatch').forEach((s, i) => {
    s.classList.toggle('selected', COLORS[i] === selectedColor);
  });
}

// ── Auth ──
document.getElementById('authUsername').addEventListener('input', e => {
  document.getElementById('authPasswordWrap').style.display =
    e.target.value.trim().toLowerCase() === 'aika' ? 'block' : 'none';
});
['authUsername','authPassword'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });
});

function joinGame() {
  const u = document.getElementById('authUsername').value.trim();
  if (!u) { document.getElementById('authError').textContent = 'Enter a username.'; return; }
  myUsername = u; pendingPassword = document.getElementById('authPassword').value;
  document.getElementById('authError').textContent = '';
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('visible');
  document.getElementById('myNameDisplay').textContent = myUsername;
  setTimeout(() => { resizeCanvases(); connectWS(); }, 50);
}

// ── WebSocket ──
function encode(o) { return btoa(unescape(encodeURIComponent(JSON.stringify(o)))); }
function decode(r) { return JSON.parse(decodeURIComponent(escape(atob(r)))); }

function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen  = () => setStatus(true);
  ws.onclose = () => { setStatus(false); logMsg('Disconnected.', 'msg-err'); };
  ws.onerror = () => logMsg('Connection error.', 'msg-err');
  ws.onmessage = e => { try { handleMsg(decode(e.data)); } catch {} };
}
function setStatus(ok) {
  document.getElementById('dot').className = 'dot' + (ok ? ' connected' : '');
  document.getElementById('statusText').textContent = ok ? 'Connected' : 'Disconnected';
}
function sendRaw(o) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(encode(o)); }
// ── Message handler ──
function handleMsg(msg) {
  switch (msg.type) {
    case 'init': {
      myId = msg.id; CANVAS_W = msg.canvasW; CANVAS_H = msg.canvasH;
      PIXEL_COOLDOWN = msg.cooldown;
      canvasData = msg.canvas;
      msg.players.forEach(p => {
        if (!players[p.id]) players[p.id] = spawnPlayer(p.id, p.username);
      });
      if (!players[myId]) players[myId] = spawnPlayer(myId, myUsername);
      sendRaw({ type: 'set_username', username: myUsername, password: pendingPassword });
      resetView();
      updatePlayerList();
      startLoop();
      break;
    }
    case 'player_joined':
      if (!players[msg.player.id]) players[msg.player.id] = spawnPlayer(msg.player.id, msg.player.username);
      logMsg(`✅ ${msg.player.username} joined`, 'msg-in');
      updatePlayerList(); break;
    case 'player_left':
      logMsg(`❌ ${players[msg.id]?.username || 'Player '+msg.id} left`, 'msg-in');
      delete players[msg.id]; updatePlayerList(); break;
    case 'player_updated':
      if (players[msg.player.id]) players[msg.player.id].username = msg.player.username;
      if (msg.player.id === myId) {
        myUsername = msg.player.username;
        document.getElementById('myNameDisplay').textContent = myUsername;
        if (myUsername === 'Aika') document.getElementById('adminPanel').classList.add('visible');
      }
      updatePlayerList(); break;
    case 'move':
      if (msg.id !== myId && players[msg.id]) {
        players[msg.id].x = msg.x; players[msg.id].y = msg.y;
      }
      break;
    case 'pixel_placed':
      if (canvasData) canvasData[msg.y * CANVAS_W + msg.x] = msg.color;
      drawPixel(msg.x, msg.y, msg.color);
      if (msg.id !== myId) logMsg(`🎨 ${msg.by} placed a pixel`, 'msg-pixel');
      break;
    case 'canvas_cleared':
      canvasData = msg.canvas; renderFullCanvas(); logMsg('🗑️ Canvas was cleared.', 'msg-sys'); break;
    case 'cooldown':
      showCooldown(msg.remaining); break;
    case 'chat':
      logMsg(`💬 ${msg.from}: ${msg.text}`, 'msg-in'); break;
    case 'error':
      if (msg.message?.includes('Slow down')) break;
      logMsg(`⚠️ ${msg.message}`, 'msg-err');
      if (msg.message?.includes('reserved') || msg.message?.includes('banned')) {
        document.getElementById('gameScreen').classList.remove('visible');
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('authError').textContent = msg.message;
      }
      break;
  }
}

function spawnPlayer(id, username) {
  return { id, username, x: CANVAS_W/2, y: CANVAS_H/2, color: playerColor(id) };
}
function playerColor(id) {
  const c = ['#ff79c6','#8be9fd','#50fa7b','#ffb86c','#bd93f9','#f1fa8c','#ff5555','#6be5fd'];
  return c[(id - 1) % c.length];
}
// ── Canvas rendering ──
function resizeCanvases() {
  const r = container.getBoundingClientRect();
  pixelCanvas.width  = playerCanvas.width  = Math.floor(r.width);
  pixelCanvas.height = playerCanvas.height = Math.floor(r.height);
  if (canvasData) renderFullCanvas();
}
window.addEventListener('resize', resizeCanvases);

function renderFullCanvas() {
  if (!canvasData) return;
  const img = pCtx.createImageData(CANVAS_W, CANVAS_H);
  for (let i = 0; i < canvasData.length; i++) {
    const hex = canvasData[i] || '#1a1a2e';
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    img.data[i*4]=r; img.data[i*4+1]=g; img.data[i*4+2]=b; img.data[i*4+3]=255;
  }
  // Draw to offscreen then scale
  const off = new OffscreenCanvas(CANVAS_W, CANVAS_H);
  off.getContext('2d').putImageData(img, 0, 0);
  pCtx.save();
  pCtx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
  pCtx.imageSmoothingEnabled = false;
  pCtx.setTransform(viewScale, 0, 0, viewScale, viewX, viewY);
  pCtx.drawImage(off, 0, 0);
  pCtx.restore();
}

function drawPixel(px, py, color) {
  pCtx.save();
  pCtx.imageSmoothingEnabled = false;
  pCtx.setTransform(viewScale, 0, 0, viewScale, viewX, viewY);
  pCtx.fillStyle = color;
  pCtx.fillRect(px, py, 1, 1);
  if (canvasData) canvasData[py * CANVAS_W + px] = color;
  pCtx.restore();
}

function drawPlayers() {
  aCtx.clearRect(0, 0, playerCanvas.width, playerCanvas.height);
  if (!myId) return;
  Object.values(players).forEach(p => {
    const sx = p.x * viewScale + viewX;
    const sy = p.y * viewScale + viewY;
    const r = Math.max(4, PLAYER_RADIUS * viewScale / 3);
    if (sx < -r || sx > playerCanvas.width + r || sy < -r || sy > playerCanvas.height + r) return;
    aCtx.save();
    aCtx.shadowColor = p.color; aCtx.shadowBlur = p.id === myId ? 12 : 6;
    aCtx.beginPath(); aCtx.arc(sx, sy, r, 0, Math.PI*2);
    aCtx.fillStyle = p.color; aCtx.globalAlpha = p.id === myId ? 1 : 0.8;
    aCtx.fill();
    if (p.id === myId) { aCtx.strokeStyle = '#fff'; aCtx.lineWidth = 1.5; aCtx.stroke(); }
    aCtx.restore();
    aCtx.save();
    aCtx.font = `bold ${Math.max(8, 9 * viewScale / 3)}px 'Comic Sans MS', cursive`;
    aCtx.textAlign = 'center'; aCtx.fillStyle = '#eee';
    aCtx.shadowColor = '#000'; aCtx.shadowBlur = 3;
    aCtx.fillText(p.username, sx, sy - r - 3);
    aCtx.restore();
  });
}

// ── View / zoom / pan ──
function clampView() {
  const W = pixelCanvas.width, H = pixelCanvas.height;
  const ww = CANVAS_W * viewScale, wh = CANVAS_H * viewScale;
  viewX = Math.min(0, Math.max(W - ww, viewX));
  viewY = Math.min(0, Math.max(H - wh, viewY));
}

function zoom(dir) {
  const cx = pixelCanvas.width / 2, cy = pixelCanvas.height / 2;
  const factor = dir > 0 ? 1.25 : 0.8;
  const newScale = Math.min(20, Math.max(1, viewScale * factor));
  viewX = cx - (cx - viewX) * (newScale / viewScale);
  viewY = cy - (cy - viewY) * (newScale / viewScale);
  viewScale = newScale;
  clampView(); renderFullCanvas();
}

function resetView() {
  if (!pixelCanvas.width) return;
  const scaleX = pixelCanvas.width / CANVAS_W;
  const scaleY = pixelCanvas.height / CANVAS_H;
  viewScale = Math.min(scaleX, scaleY, 4);
  viewX = (pixelCanvas.width  - CANVAS_W * viewScale) / 2;
  viewY = (pixelCanvas.height - CANVAS_H * viewScale) / 2;
  renderFullCanvas();
}

container.addEventListener('wheel', e => {
  e.preventDefault();
  const r = container.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const newScale = Math.min(20, Math.max(1, viewScale * factor));
  viewX = mx - (mx - viewX) * (newScale / viewScale);
  viewY = my - (my - viewY) * (newScale / viewScale);
  viewScale = newScale;
  clampView(); renderFullCanvas();
}, { passive: false });
// ── Mouse: place pixels + pan ──
function screenToPixel(sx, sy) {
  return {
    x: Math.floor((sx - viewX) / viewScale),
    y: Math.floor((sy - viewY) / viewScale),
  };
}

function tryPlace(sx, sy) {
  const { x, y } = screenToPixel(sx, sy);
  if (x < 0 || x >= CANVAS_W || y < 0 || y >= CANVAS_H) return;
  const now = Date.now();
  if (now < cooldownEnd) { showCooldown(cooldownEnd - now); return; }
  sendRaw({ type: 'place_pixel', x, y, color: selectedColor });
  drawPixel(x, y, selectedColor);
  cooldownEnd = now + PIXEL_COOLDOWN;
  startCooldownBar(PIXEL_COOLDOWN);
}

container.addEventListener('mousedown', e => {
  const r = container.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  if (e.button === 1 || e.button === 2) {
    isDragging = true; dragButton = e.button;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragViewX = viewX; dragViewY = viewY;
    e.preventDefault();
  } else if (e.button === 0) {
    isPlacing = true;
    tryPlace(sx, sy);
  }
});

container.addEventListener('mousemove', e => {
  const r = container.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  const { x, y } = screenToPixel(sx, sy);
  if (x >= 0 && x < CANVAS_W && y >= 0 && y < CANVAS_H)
    document.getElementById('coordDisplay').textContent = `(${x}, ${y})`;
  else document.getElementById('coordDisplay').textContent = '';

  if (isDragging) {
    viewX = dragViewX + (e.clientX - dragStartX);
    viewY = dragViewY + (e.clientY - dragStartY);
    clampView(); renderFullCanvas();
  } else if (isPlacing) {
    tryPlace(sx, sy);
  }
});

window.addEventListener('mouseup', e => {
  if (e.button === 1 || e.button === 2) isDragging = false;
  if (e.button === 0) isPlacing = false;
});

container.addEventListener('contextmenu', e => e.preventDefault());

// Touch support
let lastTouchDist = null;
container.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    const r = container.getBoundingClientRect();
    const t = e.touches[0];
    tryPlace(t.clientX - r.left, t.clientY - r.top);
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                               e.touches[0].clientY - e.touches[1].clientY);
  }
  e.preventDefault();
}, { passive: false });

container.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastTouchDist !== null) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX,
                         e.touches[0].clientY - e.touches[1].clientY);
    zoom(d > lastTouchDist ? 1 : -1);
    lastTouchDist = d;
  }
  e.preventDefault();
}, { passive: false });

// ── Cooldown bar ──
function startCooldownBar(duration) {
  const bar = document.getElementById('cooldownBar');
  const label = document.getElementById('cooldownLabel');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  if (cooldownAnim) clearInterval(cooldownAnim);
  const end = Date.now() + duration;
  cooldownAnim = setInterval(() => {
    const rem = Math.max(0, end - Date.now());
    bar.style.width = (rem / duration * 100) + '%';
    label.textContent = rem > 0 ? (rem / 1000).toFixed(1) + 's' : 'ready';
    if (rem === 0) clearInterval(cooldownAnim);
  }, 100);
}

function showCooldown(remaining) {
  cooldownEnd = Date.now() + remaining;
  startCooldownBar(remaining);
}
// ── Keyboard movement ──
const MOVE_KEYS = new Set(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D']);
window.addEventListener('keydown', e => {
  if (MOVE_KEYS.has(e.key)) { keys[e.key] = true; if (e.key.startsWith('Arrow')) e.preventDefault(); }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function update() {
  if (!myId || !players[myId]) return;
  const me = players[myId];
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= SPEED / viewScale;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += SPEED / viewScale;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= SPEED / viewScale;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += SPEED / viewScale;
  if (dx && dy) { dx *= 0.707; dy *= 0.707; }
  if (dx || dy) {
    me.x = Math.max(0, Math.min(CANVAS_W, me.x + dx));
    me.y = Math.max(0, Math.min(CANVAS_H, me.y + dy));
    const now = Date.now();
    if (now - lastMoveSent > 50) {
      sendRaw({ type: 'move', x: +me.x.toFixed(1), y: +me.y.toFixed(1) });
      lastMoveSent = now;
    }
  }
}

// ── Game loop ──
function startLoop() { if (animFrame) cancelAnimationFrame(animFrame); loop(); }
function loop() { update(); drawPlayers(); animFrame = requestAnimationFrame(loop); }

// ── Chat ──
function logMsg(text, cls = 'msg-sys') {
  const box = document.getElementById('log');
  const line = document.createElement('div');
  line.className = cls;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  sendRaw({ type: 'chat', text });
  logMsg(`💬 You: ${text}`, 'msg-out');
  input.value = '';
}
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') { sendChat(); e.preventDefault(); }
});

// ── Player list ──
function updatePlayerList() {
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  Object.values(players).forEach(p => {
    const div = document.createElement('div');
    div.className = 'player-entry';
    div.innerHTML = `<span class="player-color" style="background:${p.color}"></span>
      <span style="color:${p.id===myId?'#ff79c6':'#eee'}">${esc(p.username)}</span>
      <span style="margin-left:auto;color:#6272a4;font-size:9px">#${p.id}</span>`;
    list.appendChild(div);
  });
}

// ── Admin ──
function doBan() {
  const id = parseInt(document.getElementById('banInput').value);
  if (id) sendRaw({ type: 'ban', id });
}
function clearCanvas() { sendRaw({ type: 'clear_canvas' }); }

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
